<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
@keyframes waveFlow {
  0% { background: #ff9ff3; }
  50% { background: #a0e9ff; }
  100% { background: #ff9ff3; }
}

.light { animation: waveFlow 8s infinite alternate; color: black; }
.dark { background:#121212; color:white; }
.matrix { background:black; color:#00ff9f; font-family:monospace; }
.cyber { background:#0a0015; color:#ff2bd6; }

/* Theme container fix */
.container {
  max-width:900px; margin:auto; padding:20px; border-radius:12px;
}
.light .container { background:white; }
.dark .container { background:#1e1e1e; }
.matrix .container { background:#000; border:1px solid #00ff9f; }
.cyber .container { background:#14001f; }

/* Fade animation */
.result-card {
  padding:15px; margin-top:10px;
  border-radius:10px;
  overflow-wrap:anywhere;
  opacity:0;
  transform:translateY(10px);
  animation:fadeIn 0.5s forwards;
}

@keyframes fadeIn {
  to { opacity:1; transform:translateY(0); }
}

.risk-bar {
  height:10px;
  border:1px solid yellow;
  width:0%;
  transition:width 1s ease-in-out;
}

.risk-dot {
  width:12px; height:12px;
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
}

.dashboard {
  margin-top:40px; padding:20px;
  border-radius:12px;
}

/* Animated graph bars */
.graph-bar {
  height:20px; margin:6px 0;
  color:white; font-size:12px;
  padding-left:5px;
  width:0%;
  transition:width 1s ease-in-out;
  box-shadow:0 0 8px rgba(255,255,255,0.4);
}

button { padding:10px; margin:5px; border-radius:8px; cursor:pointer; }
textarea { width:95%; height:100px; }

/* Toast */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#2ecc71;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  opacity:0;
  transition:opacity 0.5s;
}
</style>
</head>

<body class="light">

<div class="container">

<div style="display:flex; justify-content:space-between;">
<h1>🔍 Phishing URL Detector</h1>

<select id="themeSelect">
<option value="light">Modern</option>
<option value="dark">Dark</option>
<option value="matrix">Matrix</option>
<option value="cyber">Cyberpunk</option>
</select>
</div>

<textarea id="url-input" placeholder="Enter URLs (one per line)"></textarea><br>

<button id="analyzeBtn">Analyze</button>
<button id="copyBtn">📋 Copy</button>
<button id="downloadBtn">⬇ Download</button>

<h2 id="alert-text"></h2>
<div id="results"></div>

<div class="dashboard">
<h2>📊 Risk Dashboard</h2>
<div id="graph"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

const PHISHING = 70;
const SUSPICIOUS = 40;

let reportData="";
let graphData=[];

/* Toast */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2000);
}

/* Theme */
function setTheme(theme){
  document.body.className=theme;
  localStorage.setItem("theme",theme);
}

window.onload=()=>{
  const saved=localStorage.getItem("theme");
  if(saved){
    document.body.className=saved;
    document.getElementById("themeSelect").value=saved;
  }
};

/* Analyze */
function analyzeBatch(){
  const urls=document.getElementById("url-input").value.split("\n");
  const results=document.getElementById("results");

  results.innerHTML="";
  reportData="";
  graphData=[];

  let highRisk=false;
  let output="";

  urls.forEach(url=>{
    url=url.trim();
    if(!url) return;

    const res=analyzeURL(url);

    output+=res.html;
    reportData+=res.text+"\n\n";
    graphData.push(res);

    if(res.score>=PHISHING) highRisk=true;
  });

  results.innerHTML=output;

  document.getElementById("alert-text").innerText=
    highRisk?"🚨 High Risk Detected":"✅ Safe";

  /* Animate bars */
  setTimeout(()=>{
    document.querySelectorAll(".risk-bar").forEach(bar=>{
      const score=bar.getAttribute("data-score");
      bar.style.width=Math.min(score,100)+"%";
    });
  },100);

  renderGraph();
}

/* URL Analysis */
function analyzeURL(url){
  let score=0;
  let reasons=[];

  function add(r){ reasons.push("✔ "+r); }

  const safeURL=url.replace(/</g,"&lt;").replace(/>/g,"&gt;");

  try{
    new URL(url.includes("://")?url:"http://"+url);
  }catch{
    score+=40; add("Invalid URL");
  }

  if(url.length>100){ score+=20; add("Long URL"); }
  if((url.match(/\./g)||[]).length>5){ score+=10; add("Too many dots"); }
  if(url.includes("@")){ score+=15; add("@ symbol"); }

  if(/verify|login|secure|account/i.test(url)){
    score+=10; add("Suspicious keyword");
  }

  if(!url.toLowerCase().startsWith("https")){
    score+=10; add("Not HTTPS");
  }

  if(!url.includes(".")){
    score+=20; add("Invalid domain");
  }

  if(score===0) add("Safe URL");

  let color="#2ecc71", label="Safe";

  if(score>=PHISHING){
    color="#e74c3c"; label="Phishing";
  }
  else if(score>=SUSPICIOUS){
    color="#f1c40f"; label="Suspicious";
  }

  const html=`
  <div class="result-card">
    ${safeURL}<br>
    Risk: ${label} (${score}%)
    <div class="risk-bar" data-score="${score}" style="background:${color};"></div>
    <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
  </div>`;

  return {html,text:url+" "+score+"%",score,color,url};
}

/* Graph */
function renderGraph(){
  const graph=document.getElementById("graph");
  graph.innerHTML="";

  graphData.forEach(r=>{
    const bar=document.createElement("div");
    bar.className="graph-bar";

    const shortURL=r.url.length>30?r.url.substring(0,30)+"...":r.url;
    bar.innerText=shortURL+" → 0%";
    bar.style.background=r.color;

    graph.appendChild(bar);

    let count=0;
    const interval=setInterval(()=>{
      if(count>=r.score){
        clearInterval(interval);
      }else{
        count++;
        bar.style.width=count+"%";
        bar.innerText=shortURL+" → "+count+"%";
      }
    },10);
  });
}

/* Copy */
function copyReport(){
  navigator.clipboard.writeText(reportData)
    .then(()=>showToast("Copied!"))
    .catch(()=>showToast("Copy failed"));
}

/* Download */
function downloadReport(){
  const blob=new Blob([reportData],{type:"text/plain"});
  const a=document.createElement("a");

  const url=URL.createObjectURL(blob);
  a.href=url;
  a.download="report.txt";
  a.click();

  URL.revokeObjectURL(url);
  showToast("Downloaded!");
}

/* Events */
document.getElementById("analyzeBtn").addEventListener("click", analyzeBatch);
document.getElementById("copyBtn").addEventListener("click", copyReport);
document.getElementById("downloadBtn").addEventListener("click", downloadReport);
document.getElementById("themeSelect").addEventListener("change", function(){
  setTheme(this.value);
});

</script>

</body>
</html>
