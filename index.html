<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f4f4f4;
}

input {
  width: 60%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  cursor: pointer;
}

.risk-meter {
  width: 80%;
  height: 20px;
  background: #ddd;
  margin: 20px auto;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  border-radius: 10px;
  background: green;
}

.dark {
  background: #121212;
  color: white;
}
</style>

</head>

<body>

<h1>🔍 Phishing URL Detector</h1>

<button onclick="toggleTheme()">🌙</button>

<br><br>

<input type="text" id="url-input" placeholder="Enter URL here">
<button onclick="analyzeURL()">Analyze</button>

<h2>Phishing Probability: <span id="probability">0%</span></h2>

<div class="risk-meter">
  <div class="bar" id="risk-bar"></div>
</div>

<h3>Explanation</h3>
<ul id="explanation-list"></ul>

<h3>Domain Info</h3>
<p>Domain Length: <span id="domain-length">-</span></p>
<p>Subdomains: <span id="subdomain-count">-</span></p>
<p>TLD: <span id="tld">-</span></p>

<script>

function toggleTheme() {
  document.body.classList.toggle("dark");
}

// Risk meter update
function updateRisk(probability) {
  const bar = document.getElementById('risk-bar');
  bar.style.width = probability + '%';

  if (probability < 40) bar.style.background = 'green';
  else if (probability < 70) bar.style.background = 'yellow';
  else bar.style.background = 'red';

  document.getElementById('probability').textContent = probability + '%';
}

// MAIN FUNCTION
function analyzeURL() {

  const url = document.getElementById('url-input').value.trim();
  const explanationList = document.getElementById('explanation-list');
  explanationList.innerHTML = "";

  if (!url) return;

  let domain = "";
  let tld = "";
  let subdomains = 0;
  let length = 0;
  let score = 0;
  let isInvalid = false;

  try {
    const normalizedUrl = url.includes('://') ? url : 'http://' + url;
    const parsed = new URL(normalizedUrl);
    domain = parsed.hostname;
  } catch (e) {
    isInvalid = true;
    addReason("✔ Invalid URL format");

    let cleaned = url.replace(/https?:\/\//, "");
    domain = cleaned.split("/")[0];

    score += 40;
  }

  if (url.includes("://:")) {
    score += 20;
    addReason("✔ Malformed URL structure");
  }

  const parts = domain.split('.');
  if (parts.length > 1) {
    tld = parts.pop();
    subdomains = Math.max(0, parts.length - 1);
  } else {
    tld = "";
    subdomains = 0;
  }
  length = domain.length;

  document.getElementById('domain-length').textContent = length;
  document.getElementById('subdomain-count').textContent = subdomains;
  document.getElementById('tld').textContent = "." + tld;

  const domainRegex = /^[a-zA-Z0-9.-]+$/;
  if (!domainRegex.test(domain)) {
    score += 20;
    addReason("✔ Invalid domain characters");
  }

  if (length > 30) { score += 15; addReason("✔ URL too long"); }
  if (subdomains > 2) { score += 10; addReason("✔ Too many subdomains"); }
  if (["tk","ml","ga","cf","gq"].includes(tld)) { score += 20; addReason("✔ Suspicious TLD"); }
  if (url.includes("@")) { score += 15; addReason("✔ Contains @ symbol"); }

  if (/verify|login|secure|account/.test(url)) {
    score += 10;
    addReason("✔ Suspicious keyword");
  }

  if (/^[a-z0-9]{10,}$/.test(domain.replace(/\./g, ""))) {
    score += 15;
    addReason("✔ Random-looking domain");
  }

  if (isInvalid && score < 50) {
    score += 20;
    addReason("✔ Suspicious malformed URL");
  }

  if (score > 100) score = 100;

  updateRisk(score);

  function addReason(text) {
    const li = document.createElement("li");
    li.textContent = text;
    explanationList.appendChild(li);
  }
}

</script>

</body>
</html>
