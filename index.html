<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>

/* 🌈 MODERN */
.light {
  background: linear-gradient(120deg, #89f7fe, #fbc2eb);
  background-size: 200% 200%;
  animation: flow 8s infinite alternate;
  color: black;
}

@keyframes flow {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* 🌙 DARK (FULL FIX) */
.dark {
  background:#121212;
  color:#e0e0e0;
}

.dark .container,
.dark .dashboard {
  background:#1e1e1e;
}

.dark textarea,
.dark button,
.dark select {
  background:#2a2a2a;
  color:#fff;
  border:1px solid #444;
}

.dark .result-card {
  background:#2a2a2a;
  color:#eee;
}

.dark .graph-bar {
  color:#fff;
}

/* 🟢 MATRIX */
.matrix { background:black; color:#00ff9f; font-family:monospace; }

.matrix .container,
.matrix .dashboard {
  background:#000;
  border:1px solid #00ff9f;
}

.matrix textarea,
.matrix button,
.matrix select {
  background:black;
  color:#00ff9f;
  border:1px solid #00ff9f;
}

.matrix .result-card {
  background:#000;
  border:1px solid #00ff9f;
}

.matrix .result-card:hover {
  box-shadow:0 0 10px #00ff9f;
}

/* ⚡ CYBER */
.cyber { background:#0a0015; color:#ff2bd6; }

.cyber .container,
.cyber .dashboard {
  background:#0a0015;
  border:1px solid #ff00ff;
  box-shadow:0 0 20px #ff00ff inset;
}

.cyber textarea,
.cyber button,
.cyber select {
  background:#120024;
  color:#fff;
  border:1px solid #00f0ff;
}

.cyber .result-card {
  background:#120024;
  border:1px solid #00f0ff;
}

.cyber .result-card:hover {
  box-shadow:0 0 15px #ff00ff, 0 0 25px #00f0ff;
}

/* 📦 COMMON UI */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
  border-radius:12px;
}

.light .container,
.light .dashboard {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
}

.result-card {
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  word-break: break-all;
  overflow-wrap: anywhere;
  transition:0.3s;
}

.result-card:hover {
  transform: scale(1.02);
  box-shadow: 0 0 15px rgba(0,255,255,0.6),
              0 0 30px rgba(255,0,255,0.4);
}

.risk-bar {
  height:10px;
  border:1px solid yellow;
  transition:width 0.6s ease;
  border-radius:5px;
}

.risk-dot {
  width:12px;
  height:12px;
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
}

.dashboard {
  margin-top:40px;
  padding:20px;
  border-radius:12px;
}

.graph-bar {
  height:20px;
  margin:6px 0;
  color:white;
  font-size:12px;
  padding-left:5px;
  border-radius:5px;
  width:0;
  transition: width 1s ease;
}

button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  box-shadow: 0 0 10px #3498db, 0 0 20px #3498db;
}

textarea {
  width:95%;
  height:100px;
}

/* 🍞 TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px 15px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.5s;
}
#toast.show { opacity: 1; }

</style>
</head>

<body class="auto">

<div class="container">

<div style="display:flex; justify-content:space-between;">
<h1>🔍 Phishing URL Detector</h1>

<select id="themeSelect">
<option value="auto">Auto</option>
<option value="light">Modern</option>
<option value="dark">Dark</option>
<option value="matrix">Matrix</option>
<option value="cyber">Cyberpunk</option>
</select>
</div>

<textarea id="url-input" placeholder="Enter URLs"></textarea><br>

<button id="analyzeBtn">Analyze</button>
<button id="copyBtn">📋 Copy</button>
<button id="downloadBtn">⬇ Download</button>

<h2 id="alert-text"></h2>
<div id="results"></div>

<div class="dashboard">
<h2>📊 Risk Dashboard</h2>
<div id="graph"></div>
</div>

</div>

<div id="toast">Copied!</div>

<script>

const PHISHING = 70;
const SUSPICIOUS = 40;

let reportData="";
let graphData=[];

/* 🎭 THEME SYSTEM WITH AUTO */
function applyAutoTheme(){
  const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.body.className = isDark ? "dark" : "light";
}

function setTheme(theme){
  if(theme==="auto"){
    localStorage.setItem("theme","auto");
    applyAutoTheme();
  } else {
    document.body.className = theme;
    localStorage.setItem("theme", theme);
  }
}

window.onload = function(){
  const saved = localStorage.getItem("theme") || "auto";
  document.getElementById("themeSelect").value = saved;

  if(saved==="auto") applyAutoTheme();
  else document.body.className = saved;
};

/* Listen for system theme change */
window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change", ()=>{
  if(localStorage.getItem("theme")==="auto"){
    applyAutoTheme();
  }
});

/* 🎨 GRADIENT */
function getGradient(score){
  if(score >= PHISHING) return "linear-gradient(90deg,#ff416c,#ff4b2b)";
  if(score >= SUSPICIOUS) return "linear-gradient(90deg,#f7971e,#ffd200)";
  return "linear-gradient(90deg,#00c9ff,#92fe9d)";
}

/* 🔍 ANALYZE */
function analyzeBatch(){
  const urls=document.getElementById("url-input").value.split("\n");
  const results=document.getElementById("results");

  results.innerHTML="";
  reportData="";
  graphData=[];

  let highRisk=false;

  urls.forEach(url=>{
    url=url.trim();
    if(!url) return;

    const res=analyzeURL(url);

    results.innerHTML += res.html;
    reportData += res.text + "\n\n";
    graphData.push(res);

    if(res.score>=PHISHING) highRisk=true;
  });

  document.getElementById("alert-text").innerText =
    highRisk?"🚨 High Risk Detected":"✅ Safe";

  renderGraph();
}

/* 🧪 ANALYSIS */
function analyzeURL(url){
  let score=0, reasons=[];
  function add(r){ reasons.push("✔ "+r); }

  const safeURL = url.replace(/</g,"&lt;").replace(/>/g,"&gt;");

  if(url.length>100){ score+=20; add("Long URL"); }
  if(url.includes("@")){ score+=15; add("@ symbol"); }
  if(/login|verify|secure|account/i.test(url)){ score+=10; add("Keyword"); }

  if(!url.startsWith("https")){ score+=10; add("No HTTPS"); }

  if(score===0) add("Safe URL");

  let label="Safe", dot="#2ecc71";
  if(score>=PHISHING){ label="Phishing"; dot="#e74c3c"; }
  else if(score>=SUSPICIOUS){ label="Suspicious"; dot="#f1c40f"; }

  const gradient=getGradient(score);

  const html=`
  <div class="result-card">
    ${safeURL}<br>
    <span class="risk-dot" style="background:${dot}"></span>
    Risk: ${label} (${score}%)
    <div class="risk-bar" style="width:${score}%;background:${gradient}"></div>
    <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
  </div>`;

  return {html, text:url+" → "+label, score, gradient, label, url};
}

/* 📊 GRAPH */
function renderGraph(){
  const graph=document.getElementById("graph");
  graph.innerHTML="";

  graphData.forEach((r,i)=>{
    const bar=document.createElement("div");
    bar.className="graph-bar";
    bar.style.background=r.gradient;
    bar.innerText=r.url.slice(0,30)+"... → "+r.score+"% ("+r.label+")";

    graph.appendChild(bar);

    setTimeout(()=>{
      bar.style.width = r.score+"%";
    }, i*150);
  });
}

/* 📋 COPY */
function copyReport(){
  navigator.clipboard.writeText(reportData).then(()=>{
    const t=document.getElementById("toast");
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
  });
}

/* ⬇ DOWNLOAD */
function downloadReport(){
  const blob=new Blob([reportData],{type:"text/plain"});
  const urlObj=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=urlObj;
  a.download="report.txt";
  a.click();

  URL.revokeObjectURL(urlObj);
}

/* EVENTS */
document.getElementById("analyzeBtn").addEventListener("click", analyzeBatch);
document.getElementById("copyBtn").addEventListener("click", copyReport);
document.getElementById("downloadBtn").addEventListener("click", downloadReport);
document.getElementById("themeSelect").addEventListener("change", function(){
  setTheme(this.value);
});

</script>

</body>
</html>
