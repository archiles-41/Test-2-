<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phishing Detector Pro</title>

<style>
body { font-family:Segoe UI; background:#dbeeff; padding:20px; transition:0.3s; }

/* THEMES */

/* DARK */
.dark { background:#121212; color:white; }

/* MATRIX */
.matrix {
  background:black;
  color:#00ff9f;
  font-family:monospace;
}

/* CYBERPUNK */
.cyber {
  background:#0a0a12;
  color:#fff;
}
.cyber .container {
  border:1px solid #ff00ff;
  box-shadow:0 0 20px #ff00ff, 0 0 40px #00f0ff inset;
}

/* TRANSFORMERS */
.transformers {
  background:#1a1a1a;
  color:#ccc;
  font-family: Impact, sans-serif;
}

/* GLASNOST */
.glasnost {
  background:linear-gradient(120deg,#89f7fe,#fbc2eb);
  background-size:200% 200%;
  animation:flow 8s infinite alternate;
}
@keyframes flow {
  0%{background-position:0%}
  100%{background-position:100%}
}

/* AUTO */
.auto .container, .auto .result-card {
  border:2px solid #f1c40f;
}

/* LAYOUT */
.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

/* INPUT */
textarea {
  width:100%;
  height:100px;
}

/* CARD */
.result-card {
  background:#f9f9f9;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  word-break:break-all;
}

/* RISK DOT */
.risk-dot {
  width:12px;height:12px;border-radius:50%;
  display:inline-block;
}
.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

/* GRAPH */
.graph {
  display:flex;
  align-items:flex-end;
  height:150px;
  gap:10px;
  margin-top:20px;
}
.bar {
  width:40px;
  background:#3498db;
  text-align:center;
  color:white;
  font-size:10px;
}

/* BUTTON */
button, select {
  padding:8px;
  margin:5px;
}
</style>

</head>

<body class="auto">

<div class="container">

<h1>🔍 Phishing Detector</h1>

<select onchange="setTheme(this.value)">
<option value="auto">Auto</option>
<option value="dark">Dark</option>
<option value="matrix">Matrix</option>
<option value="cyber">Cyberpunk</option>
<option value="transformers">Transformers</option>
<option value="glasnost">Glasnost</option>
</select>

<textarea id="url-input" placeholder="Enter URLs (one per line)"></textarea><br>

<button onclick="analyzeBatch()">Analyze</button>
<button onclick="copyReport()">📋 Copy</button>
<button onclick="downloadReport()">⬇ Download</button>

<div id="results"></div>

<h3>📊 Risk Graph</h3>
<div class="graph" id="graph"></div>

</div>

<script>

// 🔊 SOUND (Transformers)
function mechSound(){
 if(document.body.classList.contains("transformers")){
  new Audio("https://www.soundjay.com/mechanical/keyboard-1.wav").play();
 }
}

// THEME
function setTheme(t){
 if(t==="auto"){localStorage.removeItem("theme"); document.body.className="auto";}
 else{document.body.className=t; localStorage.setItem("theme",t);}
}

// LOAD
window.onload=function(){
 let t=localStorage.getItem("theme");
 if(t) document.body.className=t;
};

let reportData="";

// ANALYZE
function analyzeBatch(){
 let urls=document.getElementById("url-input").value.split("\n");
 let res=document.getElementById("results");
 let graph=document.getElementById("graph");

 res.innerHTML="";
 graph.innerHTML="";
 reportData="";

 urls.forEach(url=>{
  if(!url.trim()) return;
  let r=analyzeURL(url.trim());
  res.innerHTML+=r.html;
  graph.innerHTML+=r.bar;
  reportData+=r.text+"\n\n";
  mechSound();
 });
}

// LOGIC
function analyzeURL(url){

 let score=0,reasons=[];
 function add(r){reasons.push("✔ "+r);}

 if(url.length>100){score+=20;add("Long URL");}
 if(url.includes("@")){score+=15;add("@ symbol");}
 if(/login|verify|bank/i.test(url)){score+=10;add("Keyword");}

 if(score===0)add("Safe URL");

 let label="Safe",color="green";
 if(score>=70){label="Phishing";color="red";}
 else if(score>=40){label="Suspicious";color="yellow";}

 let html=`
 <div class="result-card">
 <b>${url}</b><br>
 ${label} <span class="risk-dot ${color}"></span>
 <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
 </div>`;

 let bar=`<div class="bar" style="height:${score}%; background:${color}">${score}%</div>`;

 let text=`${url} → ${label} (${score}%)`;

 return {html,bar,text};
}

// COPY
function copyReport(){
 navigator.clipboard.writeText(reportData);
 alert("Copied!");
}

// DOWNLOAD
function downloadReport(){
 let blob=new Blob([reportData],{type:"text/plain"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="report.txt";
 a.click();
}

</script>

</body>
</html>
