<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #dbeeff;
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

/* THEMES */

/* ☀ Light */
.light { background:#dbeeff; color:black; }

/* 🌙 Dark */
.dark { background:#121212; color:white; }

/* 🟢 Matrix */
.matrix {
  background: black;
  color: #00ff9f;
  font-family: monospace;
}

/* 🟣 Cyberpunk (Blade Runner Neon) */
.cyber {
  background: #0a0a1a;
  color: #ff2bd6;
}

.cyber h1 {
  text-shadow: 0 0 10px #ff2bd6, 0 0 20px #6a00ff;
}

.cyber button, .cyber textarea {
  background: #14001f;
  color: #00f0ff;
  border: 1px solid #ff2bd6;
  box-shadow: 0 0 8px #6a00ff;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.dark .container { background:#1e1e1e; }
.matrix .container { background:black; border:1px solid #00ff9f; }
.cyber .container { background:#14001f; }

/* BUTTON */
button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* TEXTAREA */
textarea {
  width: 95%;
  height: 100px;
}

/* RESULT CARD */
.result-card {
  background: #f9f9f9;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.dark .result-card { background:#2a2a2a; }
.matrix .result-card { border:1px solid #00ff9f; background:black; }
.cyber .result-card { border:1px solid #ff2bd6; }

/* RISK BAR */
.risk-bar {
  height: 10px;
  transition: width 0.5s ease;
}

/* RISK DOT */
.risk-dot {
  width: 12px;
  height: 12px;
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle;
}

/* GRAPH SECTION */
.graph-container {
  margin-top: 30px;
  padding: 15px;
  background: #ffffff;
  border-radius: 10px;
}

.graph-bar {
  height: 20px;
  margin: 5px 0;
  color: white;
  padding-left: 5px;
}

</style>
</head>

<body>

<div class="container">

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h1>🔍 Phishing URL Detector</h1>

  <select id="themeSelect" onchange="setTheme(this.value)">
    <option value="auto">Auto</option>
    <option value="light">Modern</option>
    <option value="dark">Dark</option>
    <option value="matrix">Matrix</option>
    <option value="cyber">Cyberpunk</option>
  </select>
</div>

<br>

<textarea id="url-input" placeholder="Enter URLs (one per line)"></textarea><br>

<button onclick="analyzeBatch()">Analyze</button>
<button onclick="copyReport()">📋 Copy</button>
<button onclick="downloadReport()">⬇ Download</button>

<h2 id="alert-text"></h2>
<div id="results"></div>

<!-- 📊 GRAPH SECTION -->
<div class="graph-container">
  <h2>📊 Risk Overview</h2>
  <div id="graph"></div>
</div>

</div>

<script>

function playAlert() {
  new Audio("https://www.soundjay.com/buttons/beep-03.wav").play();
}

function applyTheme(theme) {
  document.body.className = "";
  document.body.classList.add(theme);
}

function setTheme(theme) {
  if (theme === "auto") {
    localStorage.removeItem("theme");
    detectSystemTheme();
  } else {
    localStorage.setItem("theme", theme);
    applyTheme(theme);
  }
}

function detectSystemTheme() {
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(dark ? "dark" : "light");
}

window.onload = function() {
  const saved = localStorage.getItem("theme");
  if (saved) {
    applyTheme(saved);
    document.getElementById("themeSelect").value = saved;
  } else {
    detectSystemTheme();
  }
};

let reportData = "";
let graphData = [];

function analyzeBatch() {

  const urls = document.getElementById("url-input").value.split("\n");
  const resultsDiv = document.getElementById("results");
  const graphDiv = document.getElementById("graph");
  const alertText = document.getElementById("alert-text");

  resultsDiv.innerHTML = "";
  graphDiv.innerHTML = "";
  reportData = "";
  graphData = [];

  let highRisk = false;

  urls.forEach(url => {
    if (!url.trim()) return;

    const result = analyzeURL(url.trim());
    resultsDiv.innerHTML += result.html;
    reportData += result.text + "\n\n";
    graphData.push(result);

    if (result.score >= 70) highRisk = true;
  });

  alertText.innerText = highRisk ? "🚨 High-risk URLs detected!" : "✅ No major threats";

  // 📊 GRAPH RENDER
  graphData.forEach(r => {
    const bar = document.createElement("div");
    bar.className = "graph-bar";
    bar.style.width = r.score + "%";
    bar.style.background = r.color;
    bar.innerText = r.score + "%";
    graphDiv.appendChild(bar);
  });
}

function analyzeURL(url) {

  let score = 0;
  let reasons = [];

  function addReason(t) { reasons.push("✔ " + t); }

  try {
    new URL(url.includes("://") ? url : "http://" + url);
  } catch {
    score += 40;
    addReason("Invalid URL format");
  }

  if (url.length > 100) { score += 20; addReason("Long URL"); }
  if ((url.match(/\./g) || []).length > 5) { score += 10; addReason("Too many dots"); }
  if (url.includes("@")) { score += 15; addReason("@ symbol"); }

  if (/verify|login|secure|account/i.test(url)) {
    score += 10;
    addReason("Suspicious keyword");
  }

  if (score === 0) addReason("Safe URL");

  let color = "#2ecc71";
  let label = "Safe";
  let dotColor = "#2ecc71";

  if (score >= 70) {
    color = "#e74c3c";
    dotColor = "#e74c3c";
    label = "Phishing";
    playAlert();
  } else if (score >= 40) {
    color = "#f1c40f";
    dotColor = "#f1c40f";
    label = "Suspicious";
  }

  const html = `
  <div class="result-card">
    ${url}<br>
    <span class="risk-dot" style="background:${dotColor}"></span>
    Risk: ${label} (${score}%)
    <div class="risk-bar" style="width:${score}%; background:${color};"></div>
    <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
  </div>`;

  const text = `URL:${url} Risk:${score}% ${label}`;

  return { html, text, score, color };
}

// COPY
function copyReport() {
  navigator.clipboard.writeText(reportData);
  alert("Copied!");
}

// DOWNLOAD
function downloadReport() {
  const blob = new Blob([reportData], { type:"text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "report.txt";
  a.click();
}

</script>

</body>
</html>
