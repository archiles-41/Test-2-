<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Phishing Detector</title>

<style>
body {
  font-family: 'Segoe UI';
  background:#dbeeff;
  padding:20px;
  transition:0.4s;
}

/* AUTO MODE BORDER */
body.auto .container {
  border:2px solid #f1c40f;
}

/* MATRIX (Terminal) */
.matrix {
  background:black;
  color:#00ff9f;
  font-family:monospace;
}

/* CYBERPUNK */
.cyber {
  background:#0a0a12;
  color:#fff;
}
.cyber .container {
  border:1px solid #ff00ff;
  box-shadow:0 0 20px #ff00ff;
}

/* TRANSFORMERS */
.transformers {
  background:#1a1a1a;
  color:#ccc;
}
.transformers .container {
  border:2px solid silver;
  background:linear-gradient(#333,#111);
}

/* GLASNOST */
.glasnost {
  background:linear-gradient(120deg,#89f7fe,#fbc2eb);
  background-size:200% 200%;
  animation:flow 10s infinite alternate;
}
@keyframes flow {
  0% {background-position:0% 50%;}
  100% {background-position:100% 50%;}
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
  background:white;
  border-radius:12px;
}

/* INPUT */
textarea {
  width:100%;
  height:100px;
  padding:10px;
}

/* RESULT CARD */
.result-card {
  padding:10px;
  margin-top:10px;
  background:#f9f9f9;
  border-radius:8px;
  word-wrap:break-word;
}

/* RISK DOT */
.risk-dot {
  width:12px;height:12px;border-radius:50%;display:inline-block;
}
.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

/* GRAPH CONTAINER */
.graph {
  display:flex;
  gap:5px;
  margin-top:10px;
}
.bar {
  flex:1;
  height:20px;
  border-radius:5px;
}

button, select {
  padding:8px;
  margin:5px;
  cursor:pointer;
}

</style>
</head>

<body class="auto">

<div class="container">

<h1>🔍 Phishing Detector</h1>

<!-- 🎭 THEME SELECTOR -->
<select onchange="setTheme(this.value)">
<option value="auto">🤖 Auto</option>
<option value="light">☀ Modern</option>
<option value="dark">🌙 Dark</option>
<option value="matrix">🟢 Matrix</option>
<option value="cyber">🟣 Cyberpunk</option>
<option value="transformers">🤖 Transformers</option>
<option value="glasnost">🌊 Glasnost</option>
</select>

<textarea id="url-input" placeholder="Enter multiple URLs (one per line)"></textarea>

<button onclick="analyzeBatch()">Analyze</button>

<div id="results"></div>

</div>

<script>

// THEME
function setTheme(theme){
  if(theme==="auto"){
    localStorage.removeItem("theme");
    document.body.className="auto";
  } else {
    document.body.className=theme;
    localStorage.setItem("theme",theme);
  }
}

// LOAD THEME
window.onload=function(){
 let t=localStorage.getItem("theme");
 if(t){document.body.className=t;}
};

// ANALYZE
function analyzeBatch(){
 let urls=document.getElementById("url-input").value.split("\n");
 let res=document.getElementById("results");
 res.innerHTML="";

 urls.forEach(u=>{
  if(!u.trim()) return;
  let r=analyzeURL(u.trim());
  res.innerHTML+=r;
 });
}

function analyzeURL(url){

 let score=0,reasons=[];

 function add(r){reasons.push(r);}

 if(url.length>100){score+=20;add("Long URL");}
 if(url.includes("@")){score+=15;add("@ symbol");}
 if(/login|verify|bank/i.test(url)){score+=10;add("Keyword");}

 let label="Safe",color="green";
 if(score>=70){label="Phishing";color="red";}
 else if(score>=40){label="Suspicious";color="yellow";}

 if(score===0)add("Safe URL");

 return `
 <div class="result-card">
 <b style="word-break:break-all;">${url}</b><br>

 Risk: ${label}
 <span class="risk-dot ${color}"></span>

 <div class="graph">
   <div class="bar" style="background:${color}; width:${score}%"></div>
 </div>

 <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
 </div>
 `;
}

</script>

</body>
</html>
