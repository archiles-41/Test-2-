<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #dbeeff;
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

/* THEMES */

/* 🌙 Dark */
.dark {
  background: #121212;
  color: white;
}

/* 🟢 Terminal */
.terminal {
  background: black;
  color: #00ff9f;
  font-family: monospace;
}

/* 🟣 Cyberpunk */
.cyber {
  background: #0f0f1a;
  color: #fff;
}

/* 📦 Container */
.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.dark .container { background:#1e1e1e; }
.terminal .container { background:black; border:1px solid #00ff9f; }
.cyber .container { background:#1a1a2e; }

/* BUTTONS */
button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* TEXTAREA */
textarea {
  width: 95%;
  height: 100px;
}

/* CARD */
.result-card {
  background: #f9f9f9;
  padding: 15px;
  margin-top: 10px;
}

.dark .result-card { background:#2a2a2a; }
.terminal .result-card { border:1px solid #00ff9f; background:black; }
.cyber .result-card { border:1px solid #00f0ff; }

/* BAR */
.risk-bar {
  height: 10px;
}

/* DOT */
.risk-dot {
  width: 12px; height: 12px;
  display:inline-block; border-radius:50%;
}

.green { background:#2ecc71; }
.yellow { background:#f1c40f; }
.red { background:#e74c3c; }

</style>
</head>

<body>

<div class="container">

<h1>🔍 Phishing URL Detector</h1>

<!-- 🎭 THEME SWITCHER -->
<select id="themeSelect" onchange="setTheme(this.value)">
  <option value="auto">Auto</option>
  <option value="light">Modern</option>
  <option value="dark">Dark</option>
  <option value="terminal">Terminal</option>
  <option value="cyber">Cyberpunk</option>
</select>

<br><br>

<textarea id="url-input" placeholder="Enter URLs (one per line)"></textarea><br>

<button onclick="analyzeBatch()">Analyze</button>
<button onclick="copyReport()">📋 Copy</button>
<button onclick="downloadReport()">⬇ Download</button>

<h2 id="alert-text"></h2>
<div id="results"></div>

</div>

<script>

// 🔔 SOUND
function playAlert() {
  new Audio("https://www.soundjay.com/buttons/beep-03.wav").play();
}

// 🎭 APPLY THEME
function applyTheme(theme) {
  document.body.className = "";

  if (theme === "dark") document.body.classList.add("dark");
  if (theme === "terminal") document.body.classList.add("terminal");
  if (theme === "cyber") document.body.classList.add("cyber");
}

// 🎯 SET THEME (USER SELECT)
function setTheme(theme) {
  if (theme === "auto") {
    localStorage.removeItem("theme");
    detectSystemTheme();
  } else {
    localStorage.setItem("theme", theme);
    applyTheme(theme);
  }
}

// 🧠 SYSTEM DETECTION
function detectSystemTheme() {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(prefersDark ? "dark" : "light");
}

// 💾 LOAD THEME
window.onload = function() {
  const saved = localStorage.getItem("theme");

  if (saved) {
    applyTheme(saved);
    document.getElementById("themeSelect").value = saved;
  } else {
    detectSystemTheme();
    document.getElementById("themeSelect").value = "auto";
  }
};

// ⌨️ ENTER SUPPORT
document.getElementById("url-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    analyzeBatch();
  }
});

let reportData = "";

// 🧪 ANALYZE
function analyzeBatch() {

  const urls = document.getElementById("url-input").value.split("\n");
  const resultsDiv = document.getElementById("results");
  const alertText = document.getElementById("alert-text");

  resultsDiv.innerHTML = "";
  reportData = "";

  let highRisk = false;

  urls.forEach(url => {
    if (!url.trim()) return;

    const result = analyzeURL(url.trim());
    resultsDiv.innerHTML += result.html;
    reportData += result.text + "\n\n";

    if (result.score >= 70) highRisk = true;
  });

  alertText.innerText = highRisk ? "🚨 High-risk URLs detected!" : "✅ No major threats";
}

// 🔍 CORE LOGIC
function analyzeURL(url) {

  let score = 0;
  let reasons = [];

  function addReason(t) { reasons.push("✔ " + t); }

  let domain = "";

  try {
    domain = new URL(url.includes("://") ? url : "http://" + url).hostname;
  } catch {
    score += 40;
    addReason("Invalid URL");
  }

  if (url.length > 100) { score += 20; addReason("Long URL"); }
  if ((url.match(/\./g) || []).length > 5) { score += 10; addReason("Too many dots"); }
  if (url.includes("@")) { score += 15; addReason("@ symbol"); }

  if (/verify|login|secure|account/i.test(url)) {
    score += 10;
    addReason("Suspicious keyword");
  }

  if (score === 0) addReason("Safe URL");

  let color = "#2ecc71";
  let label = "Safe";

  if (score >= 70) {
    color = "#e74c3c";
    label = "Phishing";
    playAlert();
  } else if (score >= 40) {
    color = "#f1c40f";
    label = "Suspicious";
  }

  const html = `
  <div class="result-card">
    ${url}<br>
    Risk: ${label} (${score}%)
    <div class="risk-bar" style="width:${score}%; background:${color};"></div>
    <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
  </div>`;

  const text = `URL:${url} Risk:${score}% ${label}`;

  return { html, text, score };
}

// 📋 COPY
function copyReport() {
  navigator.clipboard.writeText(reportData);
  alert("Copied!");
}

// ⬇ DOWNLOAD
function downloadReport() {
  const blob = new Blob([reportData], { type:"text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "report.txt";
  a.click();
}

</script>

</body>
</html>
