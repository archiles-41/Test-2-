<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing Detector PRO</title>

<style>

/* 🌈 MODERN */
.light {
  background: linear-gradient(120deg,#89f7fe,#fbc2eb);
  background-size:200% 200%;
  animation:flow 8s infinite alternate;
}
@keyframes flow {
  0%{background-position:0%}
  100%{background-position:100%}
}

/* THEMES */
.auto { background:#eaf6ff; color:black; }
.dark { background:#121212; color:#eee; }
.matrix { background:black; color:#00ff9f; font-family:monospace; }
.cyber {
  background:#0a0015;
  color:#ff2bd6;
  animation: cyberPulse 2s infinite alternate;
}
@keyframes cyberPulse {
  0% { box-shadow: 0 0 10px #ff00ff inset; }
  100% { box-shadow: 0 0 30px #00f0ff inset; }
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
  border-radius:12px;
}

/* BUTTON GLOW */
button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px cyan,0 0 25px magenta;
}

/* RESULT */
.result-card {
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  transition:0.3s;
}
.result-card:hover {
  transform:scale(1.02);
  box-shadow:0 0 15px cyan,0 0 25px magenta;
}

.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

.risk-bar {
  height:10px;
  border-radius:5px;
}

/* GRAPH */
.graph-bar {
  height:22px;
  margin:4px 0;
  color:white;
  border-radius:5px;
  width:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:width 1s;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  border-radius:6px;
  opacity:0;
  transition:0.5s;
}
#toast.show { opacity:1; }

/* MATRIX CANVAS */
#matrixCanvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
  display:none;
}

</style>
</head>

<body class="auto">

<canvas id="matrixCanvas"></canvas>

<div class="container">

<h1>🔍 Phishing Detector PRO</h1>

<select id="themeSelect">
<option value="auto">Auto</option>
<option value="light">Modern</option>
<option value="dark">Dark</option>
<option value="matrix">Matrix</option>
<option value="cyber">Cyberpunk</option>
</select>

<textarea id="url-input" placeholder="Enter URLs" style="width:100%;height:100px;"></textarea><br>

<button onclick="analyzeBatch()">Analyze</button>
<button onclick="copyReport()">Copy</button>
<button onclick="downloadReport()">Download</button>

<h2 id="alert-text"></h2>
<div id="results"></div>

<h2>📊 Risk Dashboard</h2>
<h3 id="summary"></h3>
<div id="graph"></div>

</div>

<div id="toast">Copied!</div>

<script>

/* 🔊 THEME SOUND SYSTEM */
const sounds = {
 light:"https://www.soundjay.com/buttons/beep-01a.mp3",
 dark:"https://www.soundjay.com/buttons/beep-02.mp3",
 matrix:"https://www.soundjay.com/misc/sci-fi-sweep.wav",
 cyber:"https://www.soundjay.com/electronic/sci-fi-bleep.wav",
 auto:"https://www.soundjay.com/buttons/button-3.mp3"
};

const typeSound = new Audio("https://www.soundjay.com/mechanical/keyboard-2.mp3");
typeSound.volume = 0.2;

function playThemeSound(){
 const theme=document.body.className;
 const audio = new Audio(sounds[theme]);
 audio.volume = 0.5;
 audio.currentTime = 0;
 audio.play().catch(()=>{});
}

function playType(){
 typeSound.currentTime=0;
 typeSound.play().catch(()=>{});
}

document.getElementById("url-input").addEventListener("input", playType);

/* 🛡 ESCAPE */
function escapeHTML(str){
  return str.replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

/* MATRIX EFFECT */
const canvas=document.getElementById("matrixCanvas");
const ctx=canvas.getContext("2d");
const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let drops=[],matrixInterval;

function resizeCanvas(){
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
 const cols=Math.floor(canvas.width/20);
 drops=Array(cols).fill(1);
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function startMatrix(){
 canvas.style.display="block";
 matrixInterval=setInterval(drawMatrix,50);
}
function stopMatrix(){
 canvas.style.display="none";
 clearInterval(matrixInterval);
}

function drawMatrix(){
 ctx.fillStyle="rgba(0,0,0,0.05)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="#0f0";
 ctx.font="15px monospace";

 drops.forEach((y,i)=>{
  const text=letters[Math.floor(Math.random()*letters.length)];
  ctx.fillText(text,i*20,y*20);
  if(y*20>canvas.height && Math.random()>0.975) drops[i]=0;
  drops[i]++;
 });
}

/* 🎭 THEME */
document.getElementById("themeSelect").onchange=function(){
 document.body.className=this.value;
 if(this.value==="matrix") startMatrix();
 else stopMatrix();
};

/* 🔍 ANALYSIS */
let reportData="",graphData=[];

function analyzeURL(url){
 let score=0,reasons=[];
 url=url.trim();

 if (!/^https?:\/\//i.test(url)){
  score+=20; reasons.push("Non-HTTP protocol");
 }

 let parsed;
 try{
  parsed=new URL(url.includes("://")?url:"http://"+url);
 }catch{
  score+=40; reasons.push("Invalid URL");
 }

 if(parsed){
  const host=parsed.hostname;
  if(!/\.[a-z]{2,}$/i.test(host)){
    score+=20; reasons.push("Invalid domain");
  }
  if(host.includes("xn--")){
    score+=30; reasons.push("Punycode detected");
  }
 }

 if(url.length>100){score+=20;reasons.push("Long URL");}
 if((url.match(/\./g)||[]).length>5){score+=15;reasons.push("Too many dots");}
 if(url.includes("@")){score+=20;reasons.push("@ symbol");}
 if(/login|verify|secure|account/i.test(url)){
  score+=20; reasons.push("Sensitive keyword");
 }

 score=Math.min(score,100);

 let label="Safe",color="green";
 if(score>=70){label="High Risk";color="red";}
 else if(score>=40){label="Suspicious";color="yellow";}

 if(score===0) reasons.push("No issues detected");

 const safe=escapeHTML(url);

 const html=`
 <div class="result-card">
 ${safe}<br>
 Risk Score: ${label} (${score}%)
 <div class="risk-bar ${color}" style="width:${score}%"></div>
 <ul>${reasons.map(r=>"<li>"+r+"</li>").join("")}</ul>
 </div>`;

 return {html,text:url+" → "+label,score,label,url,color};
}

/* 🚀 ANALYZE */
function analyzeBatch(){
 playThemeSound();

 const urls=document.getElementById("url-input").value.split("\n");
 const results=document.getElementById("results");

 results.innerHTML="";
 reportData="";
 graphData=[];

 urls.forEach(url=>{
  if(!url.trim()) return;

  const r=analyzeURL(url);
  results.innerHTML+=r.html;
  reportData+=r.text+"\n\n";
  graphData.push(r);
 });

 renderGraph();
}

/* 📊 GRAPH */
function renderGraph(){
 const graph=document.getElementById("graph");
 graph.innerHTML="";

 graphData.forEach((r,i)=>{
  const label=document.createElement("div");
  label.innerText=`${i+1}. ${r.url} (${r.label})`;

  const bar=document.createElement("div");
  bar.className="graph-bar";
  bar.style.background=r.color;
  bar.innerText=`${r.score}%`;

  graph.appendChild(label);
  graph.appendChild(bar);

  setTimeout(()=>{bar.style.width=r.score+"%";},i*100);
 });
}

/* COPY */
function copyReport(){
 playThemeSound();

 navigator.clipboard.writeText(reportData).then(()=>{
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
 });
}

/* DOWNLOAD */
function downloadReport(){
 playThemeSound();

 const blob=new Blob([reportData]);
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;
 a.download="report.txt";
 a.click();
 URL.revokeObjectURL(url);
}

</script>

</body>
</html>
