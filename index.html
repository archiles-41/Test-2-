<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing Detector PRO MAX FIXED</title>

<style>

body {
  margin:0;
  font-family:Arial;
  overflow-x:hidden;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* THEMES */
.auto { background:#eaf6ff; }
.dark { background:#121212; color:#eee; }
.light { background:linear-gradient(120deg,#89f7fe,#fbc2eb); }
.matrix { background:black; color:#00ff9f; font-family:monospace; }
.cyber { background:#0a0015; color:#ff2bd6; }

/* UI */
textarea {
  width:100%;
  height:100px;
}

button {
  padding:10px;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 12px cyan;
}

/* RESULT CARD (NO COLOR HERE NOW) */
.result-card {
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  word-break:break-word;
}

/* ONLY BAR COLORS */
.risk-bar {
  height:10px;
  border-radius:5px;
  margin-top:5px;
}

.green { background:#2ecc71; }
.yellow { background:#f1c40f; }
.red { background:#e74c3c; }

/* GRAPH */
.graph-bar {
  height:22px;
  margin:5px 0;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:5px;
  width:0;
  transition:1s;
}

</style>
</head>

<body class="auto">

<div class="container">

<h1>🔍 Phishing Detector PRO FIXED</h1>

<textarea id="url-input" placeholder="Enter URLs"></textarea>

<br>

<button onclick="unlockAudio(); playClick(); analyzeBatch()">Analyze</button>
<button onclick="playClick(); copyReport()">Copy</button>
<button onclick="playClick(); downloadReport()">Download</button>

<h3>🔊 Volume</h3>
<input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setVolume(this.value)">

<div id="results"></div>

<h2>📊 Dashboard</h2>
<h3 id="summary"></h3>
<div id="graph"></div>

</div>

<script>

/* ================= AUDIO FIX (IMPORTANT) ================= */

let audioUnlocked = false;
let masterVol = 0.8;

const sounds = {
 click: new Audio("sounds/click.mp3"),
 key1: new Audio("sounds/key1.mp3"),
 key2: new Audio("sounds/key2.mp3"),
 space: new Audio("sounds/space.mp3"),
 enter: new Audio("sounds/enter.mp3"),
 backspace: new Audio("sounds/backspace.mp3")
};

/* unlock audio (CRITICAL FIX) */
function unlockAudio(){
 if(audioUnlocked) return;
 audioUnlocked = true;

 Object.values(sounds).forEach(a=>{
  a.volume = 0.0001;
  a.play().then(()=>a.pause()).catch(()=>{});
 });
}

/* safe play */
function play(a,vol=1){
 if(!audioUnlocked) return;

 const audio = a.cloneNode();
 audio.volume = vol * masterVol;
 audio.play().catch(()=>{});
}

/* sounds */
function playClick(){ play(sounds.click,0.8); }

document.getElementById("url-input").addEventListener("keydown",e=>{
 if(!audioUnlocked) return;

 if(e.key===" ") play(sounds.space,0.6);
 else if(e.key==="Enter") play(sounds.enter,0.6);
 else if(e.key==="Backspace") play(sounds.backspace,0.5);
 else play(Math.random()>0.5?sounds.key1:sounds.key2,0.4);
});

/* volume */
function setVolume(v){ masterVol=v; }

/* ================= SAFE ESCAPE ================= */

function escapeHTML(s){
 return s.replace(/[&<>"']/g,m=>({
 '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
 }[m]));
}

/* ================= ANALYSIS ================= */

let reportData="",graphData=[];

function analyzeURL(url){
 let score=0,reasons=[];

 url=url.trim();

 if(!/^https?:\/\//i.test(url)){
  score+=20; reasons.push("No HTTPS");
 }

 try{
  const u=new URL(url.includes("://")?url:"http://"+url);

  if(u.hostname.includes("xn--")){
   score+=30; reasons.push("Punycode");
  }

  if(!/\.[a-z]{2,}$/i.test(u.hostname)){
   score+=20; reasons.push("Bad domain");
  }

 }catch{
  score+=40; reasons.push("Invalid URL");
 }

 if(url.length>100){score+=15;reasons.push("Long URL");}
 if(url.includes("@")){score+=20;reasons.push("@ symbol");}
 if(/login|verify|secure|account/i.test(url)){
  score+=20; reasons.push("Sensitive word");
 }

 score=Math.min(score,100);

 let label="Safe",color="green";
 if(score>=70){label="High Risk";color="red";}
 else if(score>=40){label="Suspicious";color="yellow";}

 const safe=escapeHTML(url);

 return {
  html:`
  <div class="result-card">
   ${safe}<br>
   Risk Score: ${score}% (${label})

   <div class="risk-bar ${color}" style="width:${score}%"></div>

   <ul>${reasons.map(r=>`<li>${r}</li>`).join("")}</ul>
  </div>`,
  text:url+" → "+label,
  score,color
 };
}

/* ================= MAIN ================= */

function analyzeBatch(){
 playClick();

 const urls=document.getElementById("url-input").value.split("\n");

 const res=document.getElementById("results");
 res.innerHTML="";
 reportData="";
 graphData=[];

 urls.forEach(u=>{
  if(!u.trim()) return;

  const r=analyzeURL(u);
  res.innerHTML+=r.html;
  reportData+=r.text+"\n\n";
  graphData.push(r);
 });

 renderGraph();
}

/* ================= GRAPH ================= */

function renderGraph(){
 const g=document.getElementById("graph");
 g.innerHTML="";

 let high=0,mid=0,low=0;

 graphData.forEach(r=>{
  if(r.score>=70) high++;
  else if(r.score>=40) mid++;
  else low++;
 });

 document.getElementById("summary").innerText=
 `High: ${high} | Suspicious: ${mid} | Safe: ${low}`;

 graphData.forEach((r,i)=>{
  const l=document.createElement("div");
  l.innerText=r.text;

  const b=document.createElement("div");
  b.className="graph-bar";
  b.style.background=r.color;
  b.innerText=r.score+"%";

  g.appendChild(l);
  g.appendChild(b);

  setTimeout(()=>b.style.width=r.score+"%",i*100);
 });
}

/* ================= REPORT ================= */

function copyReport(){
 navigator.clipboard.writeText(reportData);
}

function downloadReport(){
 const b=new Blob([reportData]);
 const u=URL.createObjectURL(b);
 const a=document.createElement("a");
 a.href=u;
 a.download="report.txt";
 a.click();
}

</script>

</body>
</html>
