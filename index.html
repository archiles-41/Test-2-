<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #dbeeff;
}
.dark {
  background: #121212;
  color: white;
}
textarea {
  width: 90%;
  height: 80px;
  padding: 10px;
}
button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}
.bar {
  height: 20px;
  width: 0%;
  background: green;
}
</style>
</head>

<body>

<h1>🔍 Phishing URL Detector</h1>
<button onclick="toggleTheme()">🌙</button>

<textarea id="url-input" placeholder="Enter one or multiple URLs (each in new line)"></textarea><br>

<button onclick="analyzeBatch()">Analyze</button>
<button onclick="copyReport()">📋 Copy</button>
<button onclick="downloadReport()">⬇ Download</button>

<h2 id="alert-text"></h2>

<div id="results"></div>

<script>

// 🔔 SOUND ALERT
function playAlert() {
  const audio = new Audio("https://www.soundjay.com/buttons/beep-03.wav");
  audio.play();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

let reportData = "";

// 🧪 BATCH ANALYSIS
function analyzeBatch() {
  const input = document.getElementById("url-input").value.trim();
  const urls = input.split("\n").filter(u => u.trim() !== "");
  const resultsDiv = document.getElementById("results");

  resultsDiv.innerHTML = "";
  reportData = "";

  urls.forEach(url => {
    const result = analyzeURL(url.trim());
    resultsDiv.innerHTML += result.html;
    reportData += result.text + "\n\n";
  });
}

// 🔍 CORE FUNCTION
function analyzeURL(url) {

  let score = 0;
  let domainScore = 0;
  let structureScore = 0;
  let keywordScore = 0;

  let reasons = [];

  function addReason(text) {
    reasons.push(text);
  }

  let domain = "";

  try {
    const parsed = new URL(url.includes("://") ? url : "http://" + url);
    domain = parsed.hostname;
  } catch {
    score += 40;
    structureScore += 40;
    addReason("Invalid URL format");
  }

  // STRUCTURE CHECKS
  if (url.includes("://:")) {
    score += 20;
    structureScore += 20;
    addReason("Malformed structure");
  }

  if (url.includes("@")) {
    score += 15;
    structureScore += 15;
    addReason("Contains @ symbol");
  }

  // DOMAIN CHECKS
  if (domain.length > 30) {
    score += 15;
    domainScore += 15;
    addReason("Long domain");
  }

  if (/^[a-z0-9]{10,}$/i.test(domain.replace(/\./g, ""))) {
    score += 15;
    domainScore += 15;
    addReason("Random domain");
  }

  // KEYWORD CHECK
  if (/verify|login|secure|account/i.test(url)) {
    score += 10;
    keywordScore += 10;
    addReason("Suspicious keyword");
  }

  if (score > 100) score = 100;

  // ✅ SAFE MESSAGE FIX
  if (score === 0) {
    addReason("✔ This URL appears safe (no phishing indicators found)");
  }

  // 🚨 SMART ALERT
  if (score >= 70) {
    playAlert();
    alert("🚨 This looks dangerous. Proceed carefully.");
  }

  // UI OUTPUT
  const html = `
    <hr>
    <b>URL:</b> ${url}<br>
    <b>Overall Risk:</b> ${score}%<br>

    <b>Breakdown:</b><br>
    Domain Risk: ${domainScore}%<br>
    Structure Risk: ${structureScore}%<br>
    Keyword Risk: ${keywordScore}%<br>

    <b>Reasons:</b>
    <ul>${reasons.map(r => `<li>${r}</li>`).join("")}</ul>
  `;

  // TEXT REPORT
  const text = `
URL: ${url}
Overall Risk: ${score}%

Breakdown:
Domain: ${domainScore}%
Structure: ${structureScore}%
Keyword: ${keywordScore}%

Reasons:
${reasons.join(", ")}
`;

  return { html, text };
}

// 📋 COPY
function copyReport() {
  navigator.clipboard.writeText(reportData);
  alert("Report copied!");
}

// ⬇ DOWNLOAD
function downloadReport() {
  const blob = new Blob([reportData], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "phishing_report.txt";
  a.click();
}

</script>

</body>
</html>
