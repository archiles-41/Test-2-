<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing Detector PRO MAX</title>

<style>

/* ================= THEMES ================= */

body {
  margin:0;
  font-family:Arial;
  overflow-x:hidden;
  transition:0.4s;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* 🌈 MODERN */
.light {
  background: linear-gradient(120deg,#89f7fe,#fbc2eb);
  background-size:200% 200%;
  animation:flow 8s infinite alternate;
}
@keyframes flow {
  0%{background-position:0%}
  100%{background-position:100%}
}

/* 🌙 DARK */
.dark { background:#121212; color:#eee; }

/* 🤖 AUTO */
.auto { background:#eaf6ff; color:black; }

/* 👾 MATRIX */
.matrix { background:black; color:#00ff9f; font-family:monospace; }

/* ⚡ CYBER */
.cyber {
  background:#0a0015;
  color:#ff2bd6;
  animation: cyberPulse 2s infinite alternate;
}
@keyframes cyberPulse {
  0% { box-shadow: 0 0 10px #ff00ff inset; }
  100% { box-shadow: 0 0 30px #00f0ff inset; }
}

/* ================= UI ================= */

textarea {
  width:100%;
  height:100px;
  resize:vertical;
}

button {
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
  border:none;
  border-radius:6px;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px cyan,0 0 25px magenta;
}

.result-card {
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  word-break:break-word;
  overflow-wrap:anywhere;
  transition:0.3s;
}

.result-card:hover {
  transform:scale(1.02);
  box-shadow:0 0 12px cyan;
}

.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}

.graph-bar {
  height:22px;
  margin:5px 0;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:5px;
  width:0;
  transition:1s;
}

/* MATRIX CANVAS */
#matrixCanvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
  display:none;
}

</style>
</head>

<body class="auto">

<canvas id="matrixCanvas"></canvas>

<div class="container">

<h1>🔍 Phishing Detector PRO MAX</h1>

<select id="themeSelect">
<option value="auto">Auto</option>
<option value="light">Modern</option>
<option value="dark">Dark</option>
<option value="matrix">Matrix</option>
<option value="cyber">Cyberpunk</option>
</select>

<br><br>

<textarea id="url-input" placeholder="Enter URLs"></textarea>

<br>

<button onclick="playClick(); analyzeBatch()">Analyze</button>
<button onclick="playClick(); copyReport()">Copy</button>
<button onclick="playClick(); downloadReport()">Download</button>

<!-- 🔊 SOUND PANEL -->
<h3>🔊 Sound Controls</h3>

Master:
<input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setMaster(this.value)"><br>

Typing:
<input type="range" min="0" max="1" step="0.1" value="0.6" oninput="setType(this.value)"><br>

Click:
<input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setClick(this.value)"><br>

Theme:
<input type="range" min="0" max="1" step="0.1" value="0.8" oninput="setThemeVol(this.value)">

<div id="results"></div>

<h2>📊 Dashboard</h2>
<h3 id="summary"></h3>
<div id="graph"></div>

</div>

<script>

/* ================= SOUND ENGINE ================= */

const SOUND = {
 click:["sounds/click.mp3"],
 type:["sounds/key1.mp3","sounds/key2.mp3"],
 space:"sounds/space.mp3",
 enter:"sounds/enter.mp3",
 backspace:"sounds/backspace.mp3",
 theme:{
  light:"sounds/light.mp3",
  dark:"sounds/dark.mp3",
  matrix:"sounds/matrix.mp3",
  cyber:"sounds/cyber.mp3",
  auto:"sounds/light.mp3"
 }
};

let master=0.8,typeVol=0.6,clickVol=0.8,themeVol=0.8;

function play(src,vol){
 const a=new Audio(src);
 a.volume=vol*master;
 a.play().catch(()=>{});
}

function rand(arr){
 return arr[Math.floor(Math.random()*arr.length)];
}

function playClick(){ play(rand(SOUND.click),clickVol); }

function playTheme(){
 const t=document.body.className||"auto";
 play(SOUND.theme[t],themeVol);
}

/* 🎹 SMART KEYBOARD */
let last=0;

document.getElementById("url-input").addEventListener("keydown",e=>{
 const now=Date.now();
 if(now-last<40) return;
 last=now;

 if(e.key===" ") play(SOUND.space,typeVol);
 else if(e.key==="Enter") play(SOUND.enter,typeVol);
 else if(e.key==="Backspace") play(SOUND.backspace,typeVol);
 else play(rand(SOUND.type),typeVol);
});

/* ================= MATRIX ================= */

const canvas=document.getElementById("matrixCanvas");
const ctx=canvas.getContext("2d");
const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let drops=[],matrixInterval;

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
 drops=Array(Math.floor(canvas.width/20)).fill(1);
}
resize();
window.addEventListener("resize",resize);

function drawMatrix(){
 if(document.body.className!=="matrix") return;

 ctx.fillStyle="rgba(0,0,0,0.05)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#0f0";
 ctx.font="15px monospace";

 drops.forEach((y,i)=>{
  const text=letters[Math.floor(Math.random()*letters.length)];
  ctx.fillText(text,i*20,y*20);
  if(y*20>canvas.height && Math.random()>0.975) drops[i]=0;
  drops[i]++;
 });
}
setInterval(drawMatrix,50);

/* ================= THEME ================= */

document.getElementById("themeSelect").onchange=function(){
 document.body.className=this.value;
 if(this.value==="matrix"){
  canvas.style.display="block";
 } else {
  canvas.style.display="none";
 }
};

/* ================= SECURITY ================= */

function escapeHTML(s){
 return s.replace(/[&<>"']/g,m=>({
 '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
 }[m]));
}

/* ================= ANALYSIS ================= */

let reportData="",graphData=[];

function analyzeURL(url){
 let score=0,reasons=[];

 url=url.trim();

 if(!/^https?:\/\//i.test(url)){
  score+=20; reasons.push("No HTTP/HTTPS");
 }

 let u;
 try{
  u=new URL(url.includes("://")?url:"http://"+url);
 }catch{
  score+=40; reasons.push("Invalid URL");
 }

 if(u){
  const host=u.hostname;
  if(host.includes("xn--")){score+=30;reasons.push("Punycode");}
  if(!/\.[a-z]{2,}$/i.test(host)){score+=20;reasons.push("Bad domain");}
 }

 if(url.length>100){score+=15;reasons.push("Long URL");}
 if(url.includes("@")){score+=20;reasons.push("@ symbol");}
 if(/login|verify|secure|account/i.test(url)){score+=20;reasons.push("Sensitive word");}

 score=Math.min(score,100);

 let label="Safe",color="green";
 if(score>=70){label="High Risk";color="red";}
 else if(score>=40){label="Suspicious";color="yellow";}

 const safe=escapeHTML(url);

 return {
  html:`
  <div class="result-card ${color}">
   ${safe}<br>
   Risk Score: ${score}% (${label})
   <ul>${reasons.map(r=>`<li>${r}</li>`).join("")}</ul>
  </div>`,
  text:url+" → "+label,
  score,color
 };
}

/* ================= MAIN ================= */

function analyzeBatch(){
 playTheme();

 const urls=document.getElementById("url-input").value.split("\n");

 const res=document.getElementById("results");
 res.innerHTML="";
 reportData="";
 graphData=[];

 urls.forEach(u=>{
  if(!u.trim()) return;

  const r=analyzeURL(u);
  res.innerHTML+=r.html;
  reportData+=r.text+"\n\n";
  graphData.push(r);
 });

 renderGraph();
}

/* ================= GRAPH ================= */

function renderGraph(){
 const g=document.getElementById("graph");
 g.innerHTML="";

 let high=0,mid=0,low=0;

 graphData.forEach(r=>{
  if(r.score>=70) high++;
  else if(r.score>=40) mid++;
  else low++;
 });

 document.getElementById("summary").innerText=
 `High: ${high} | Suspicious: ${mid} | Safe: ${low}`;

 graphData.forEach((r,i)=>{
  const l=document.createElement("div");
  l.innerText=`${i+1}. ${r.score}%`;

  const b=document.createElement("div");
  b.className="graph-bar";
  b.style.background=r.color;
  b.innerText=r.score+"%";

  g.appendChild(l);
  g.appendChild(b);

  setTimeout(()=>b.style.width=r.score+"%",i*100);
 });
}

/* ================= REPORT ================= */

function copyReport(){
 navigator.clipboard.writeText(reportData);
}

function downloadReport(){
 const b=new Blob([reportData]);
 const u=URL.createObjectURL(b);
 const a=document.createElement("a");
 a.href=u;
 a.download="report.txt";
 a.click();
}

/* ================= VOLUME ================= */

function setMaster(v){master=v;}
function setType(v){typeVol=v;}
function setClick(v){clickVol=v;}
function setThemeVol(v){themeVol=v;}

</script>

</body>
</html>
