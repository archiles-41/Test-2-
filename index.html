<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #dbeeff;
  margin: 0;
  padding: 20px;
}

/* 🌙 Dark Mode */
.dark {
  background: #121212;
  color: white;
}

/* 📦 Container */
.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.dark .container {
  background: #1e1e1e;
}

/* 🔝 Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 🔘 Buttons */
button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 8px;
  transition: 0.2s;
}

button:hover {
  background: #2980b9;
  transform: scale(1.05);
}

/* 🌗 Toggle */
.toggle-btn {
  font-size: 18px;
  background: #555;
}

/* 📝 Input */
textarea {
  width: 95%;
  height: 100px;
  padding: 10px;
  margin-top: 10px;
}

/* 🚦 Risk Dot */
.risk-dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-left: 8px;
}

.green { background: #2ecc71; }
.yellow { background: #f1c40f; }
.red { background: #e74c3c; }

/* 📊 Risk Bar */
.risk-bar-container {
  width: 100%;
  background: #ffffff;
  height: 10px;
  border-radius: 6px;
  overflow: hidden;
  margin-top: 10px;
  border: 1px solid #ccc;
}

.risk-bar {
  height: 100%;
  width: 0%;
  transition: width 0.4s ease;
}

/* 📄 Result Card */
.result-card {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  border-left: 5px solid #3498db;
}

.dark .result-card {
  background: #2a2a2a;
}

/* ⚠ Alert */
#alert-text {
  font-weight: bold;
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🔍 Phishing URL Detector</h1>
    <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>

  <textarea id="url-input" placeholder="Enter URLs (one per line)"></textarea><br>

  <button onclick="analyzeBatch()">Analyze</button>
  <button onclick="copyReport()">📋 Copy</button>
  <button onclick="downloadReport()">⬇ Download</button>

  <h2 id="alert-text"></h2>
  <div id="results"></div>

  <p style="text-align:center; margin-top:20px; font-size:12px;">
    Built for security awareness ⚡
  </p>

</div>

<script>

// 🔔 Sound
function playAlert() {
  const audio = new Audio("https://www.soundjay.com/buttons/beep-03.wav");
  audio.play();
}

// 🌙 Theme Toggle (UPDATED with memory)
function toggleTheme() {
  document.body.classList.toggle("dark");

  const isDark = document.body.classList.contains("dark");
  const btn = document.getElementById("themeBtn");

  btn.innerText = isDark ? "☀" : "🌙";

  // 💾 SAVE THEME
  localStorage.setItem("theme", isDark ? "dark" : "light");
}

// 💾 LOAD SAVED THEME ON PAGE LOAD
window.onload = function() {
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {
    document.body.classList.add("dark");
    document.getElementById("themeBtn").innerText = "☀";
  }
};

// ⌨️ Enter Support
document.getElementById("url-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    analyzeBatch();
  }
});

let reportData = "";

// 🧪 Analyze Batch
function analyzeBatch() {

  const input = document.getElementById("url-input").value.trim();
  const urls = input.split("\n").filter(u => u.trim() !== "");
  const resultsDiv = document.getElementById("results");
  const alertText = document.getElementById("alert-text");

  resultsDiv.innerHTML = "";
  reportData = "";
  alertText.innerText = "";

  if (urls.length === 0) {
    alertText.innerText = "⚠️ Please enter at least one URL";
    return;
  }

  let highRiskFound = false;

  urls.forEach(url => {
    const result = analyzeURL(url);
    resultsDiv.innerHTML += result.html;
    reportData += result.text + "\n\n";

    if (result.score >= 70) highRiskFound = true;
  });

  if (highRiskFound) {
    alertText.innerText = "🚨 High-risk URLs detected!";
    alertText.style.background = "#ffdddd";
  } else {
    alertText.innerText = "✅ No major threats found.";
    alertText.style.background = "#ddffdd";
  }
}

// 🔍 Analyze URL (UNCHANGED)
function analyzeURL(url) {

  let score = 0;
  let reasons = [];

  function addReason(text) {
    reasons.push("✔ " + text);
  }

  let domain = "";

  try {
    const parsed = new URL(url.includes("://") ? url : "http://" + url);
    domain = parsed.hostname;
  } catch {
    score += 40;
    addReason("Invalid URL format");
  }

  if (url.length > 100) { score += 20; addReason("URL too long"); }
  if ((url.match(/\./g) || []).length > 5) { score += 10; addReason("Too many dots"); }
  if ((url.match(/&/g) || []).length > 5) { score += 15; addReason("Too many parameters"); }
  if (/redirect|click|track|adurl/i.test(url)) { score += 20; addReason("Redirect pattern"); }
  if (url.includes("@")) { score += 15; addReason("Contains @"); }

  if (domain && domain.length > 30) {
    score += 15;
    addReason("Long domain");
  }

  if (domain && /^[a-z0-9]{10,}$/i.test(domain.replace(/\./g, ""))) {
    score += 15;
    addReason("Random-looking domain");
  }

  const keywords = ["verify","login","secure","account","update","bank","password","signin"];
  keywords.forEach(k => {
    if (url.toLowerCase().includes(k)) {
      score += 10;
      addReason(`Keyword: ${k}`);
    }
  });

  if (score > 100) score = 100;

  let colorClass = "green";
  let label = "Safe";
  let barColor = "#2ecc71";

  if (score >= 70) {
    colorClass = "red";
    label = "Phishing";
    barColor = "#e74c3c";
    playAlert();
  } else if (score >= 40) {
    colorClass = "yellow";
    label = "Suspicious";
    barColor = "#f1c40f";
  }

  if (reasons.length === 0) reasons.push("✔ No major issues");

  const html = `
  <div class="result-card">
    <b>🔗 URL:</b> ${url}<br><br>

    ⭐ <b>Confidence Score:</b> ${score}%<br><br>

    ⭐ <b>Risk:</b> ${label}
    <span class="risk-dot ${colorClass}"></span>

    <div class="risk-bar-container">
      <div class="risk-bar" style="width:${score}%; background:${barColor};"></div>
    </div>

    <br>
    <b>Explanation:</b>
    <ul>${reasons.map(r => `<li>${r}</li>`).join("")}</ul>
  </div>`;

  const text = `URL: ${url}\nScore: ${score}%\nRisk: ${label}\n${reasons.join("\n")}`;

  return { html, text, score };
}

// 📋 Copy
function copyReport() {
  if (!reportData) return alert("Nothing to copy!");
  navigator.clipboard.writeText(reportData);
  alert("Copied!");
}

// ⬇ Download
function downloadReport() {
  if (!reportData) return alert("Nothing to download!");

  const blob = new Blob([reportData], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "phishing_report.txt";
  a.click();
}

</script>

</body>
</html>
