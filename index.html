<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phishing URL Detector</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #dbeeff;
}

.dark {
  background: #121212;
  color: white;
}

textarea {
  width: 90%;
  height: 100px;
  padding: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
}

/* 🔴🟡🟢 Risk Dot */
.risk-dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-left: 8px;
}

.green { background: #2ecc71; }
.yellow { background: #f1c40f; }
.red { background: #e74c3c; }

/* 📊 Progress Bar */
#progress-container {
  width: 90%;
  background: #ccc;
  height: 20px;
  display: none;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: green;
  transition: width 0.3s ease;
}

</style>
</head>

<body>

<h1>🔍 Phishing URL Detector</h1>
<button onclick="toggleTheme()">🌙</button>

<textarea id="url-input" placeholder="Enter URLs (one per line)"></textarea><br>

<button onclick="analyzeBatch()">Analyze</button>
<button onclick="copyReport()">📋 Copy</button>
<button onclick="downloadReport()">⬇ Download</button>

<!-- 📊 Progress UI -->
<div id="progress-container">
  <div id="progress-bar"></div>
</div>
<p id="progress-text"></p>

<h2 id="alert-text"></h2>

<div id="results"></div>

<script>

// 🔔 SOUND ALERT
function playAlert() {
  const audio = new Audio("https://www.soundjay.com/buttons/beep-03.wav");
  audio.play();
}

// 🌙 THEME
function toggleTheme() {
  document.body.classList.toggle("dark");
}

// ⌨️ ENTER KEY SUPPORT
document.getElementById("url-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    analyzeBatch();
  }
});

let reportData = "";

// 🧪 BATCH ANALYSIS WITH ANIMATION
function analyzeBatch() {

  const input = document.getElementById("url-input").value.trim();
  const urls = input.split("\n").filter(u => u.trim() !== "");
  const resultsDiv = document.getElementById("results");
  const alertText = document.getElementById("alert-text");

  const progressBar = document.getElementById("progress-bar");
  const progressContainer = document.getElementById("progress-container");
  const progressText = document.getElementById("progress-text");

  resultsDiv.innerHTML = "";
  reportData = "";
  alertText.innerText = "";

  if (urls.length === 0) {
    alertText.innerText = "⚠️ Please enter at least one URL";
    return;
  }

  // Show progress UI
  progressContainer.style.display = "block";
  progressBar.style.width = "0%";
  progressText.innerText = "🔍 Analyzing URLs...";

  let index = 0;
  let highRiskFound = false;

  function processNext() {

    if (index < urls.length) {

      const result = analyzeURL(urls[index]);
      resultsDiv.innerHTML += result.html;
      reportData += result.text + "\n\n";

      if (result.score >= 70) {
        highRiskFound = true;
      }

      index++;

      let percent = Math.floor((index / urls.length) * 100);
      progressBar.style.width = percent + "%";
      progressText.innerText = `🔍 Processing... ${percent}%`;

      setTimeout(processNext, 300); // animation delay

    } else {

      progressText.innerText = "✅ Analysis Complete!";

      if (highRiskFound) {
        alertText.innerText = "🚨 High-risk URLs detected!";
      } else {
        alertText.innerText = "✅ No major threats found.";
      }
    }
  }

  processNext();
}

// 🔍 CORE ANALYSIS FUNCTION
function analyzeURL(url) {

  let score = 0;
  let reasons = [];

  function addReason(text) {
    reasons.push("✔ " + text);
  }

  let domain = "";

  try {
    const parsed = new URL(url.includes("://") ? url : "http://" + url);
    domain = parsed.hostname;
  } catch {
    score += 40;
    addReason("Invalid URL format");
  }

  if (url.length > 100) {
    score += 20;
    addReason("URL too long");
  }

  const dotCount = (url.match(/\./g) || []).length;
  if (dotCount > 5) {
    score += 10;
    addReason("Too many dots in URL");
  }

  const paramCount = (url.match(/&/g) || []).length;
  if (paramCount > 5) {
    score += 15;
    addReason("Too many query parameters");
  }

  if (/redirect|click|track|adurl/i.test(url)) {
    score += 20;
    addReason("Contains redirect/tracking pattern");
  }

  if (url.includes("@")) {
    score += 15;
    addReason("Contains @ symbol");
  }

  if (domain && domain.length > 30) {
    score += 15;
    addReason("Long domain name");
  }

  if (domain && /^[a-z0-9]{10,}$/i.test(domain.replace(/\./g, ""))) {
    score += 15;
    addReason("Random-looking domain");
  }

  const keywords = ["verify", "login", "secure", "account", "update", "bank", "password", "signin"];
  keywords.forEach(k => {
    if (url.toLowerCase().includes(k)) {
      score += 10;
      addReason(`Suspicious keyword: ${k}`);
    }
  });

  if (score > 100) score = 100;

  let colorClass = "green";
  let label = "Safe";

  if (score >= 70) {
    colorClass = "red";
    label = "Phishing";
    playAlert();
  } else if (score >= 40) {
    colorClass = "yellow";
    label = "Suspicious";
  }

  if (reasons.length === 0) {
    reasons.push("✔ No major phishing indicators found");
  }

  const html = `
    <hr>
    <b>🔗 URL:</b> ${url}<br><br>

    ⭐ <b>Confidence Score:</b> ${score}%<br><br>

    ⭐ <b>Risk Meter:</b> ${label}
    <span class="risk-dot ${colorClass}"></span>
    <br><br>

    ⭐ <b>Explanation:</b>
    <ul>${reasons.map(r => `<li>${r}</li>`).join("")}</ul>
  `;

  const text = `
URL: ${url}
Phishing Probability: ${score}%
Risk Level: ${label}

Reasons:
${reasons.join("\n")}
`;

  return { html, text, score };
}

// 📋 COPY
function copyReport() {
  if (!reportData) {
    alert("Nothing to copy!");
    return;
  }
  navigator.clipboard.writeText(reportData);
  alert("Report copied!");
}

// ⬇ DOWNLOAD
function downloadReport() {
  if (!reportData) {
    alert("Nothing to download!");
    return;
  }

  const blob = new Blob([reportData], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "phishing_report.txt";
  a.click();
}

</script>

</body>
</html>
